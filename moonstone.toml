[package]
name = "moonstone/love-importer"
version = "0.1.4"
kind = "bin"
description = "Import local LÖVE installations into normalized Moonstone runtime artifacts"

[interpreter]
name = "lua"
version = "5.1"
abi = "5.1"

[scripts]
"test" = "moon run build && bash tests/smoke.sh"
"build" = "mkdir -p build/src/love_importer && moon exec moonc -t build src/main.moon src/love_importer/cli.moon && cp src/love_importer/*.lua build/src/love_importer/"
"export" = "moon run build && moon exec ballad play partiture.lua"
"love-importer" = "moon run build && moon exec lua build/src/main.lua \"$@\""

[[dependencies]]
name = "argparse"
constraint = "^0.7.1-1"
resolver = "rocks"
role = "runtime"

[[dependencies]]
name = "moonscript"
constraint = "^0.6.0-1"
resolver = "rocks"
role = "tool"

[[dependencies]]
name = "moonstone/ballad"
constraint = "^0.2.19"
resolver = "moonstone"
role = "tool"
