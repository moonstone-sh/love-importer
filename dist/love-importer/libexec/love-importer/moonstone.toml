[package]
name = "moonstone/love-importer"
version = "0.1.1"
kind = "script"
description = "Import local LÖVE installations into normalized Moonstone runtime artifacts"

[runtime]
name = "lua"
version = "5.1"
abi = "5.1"

[dependencies.tool]
"moonstone/ballad" = "^0.2.3"

[scripts]
"test" = "bash tests/smoke.sh"
"export" = "moon exec ballad -- play partiture.lua"
"love-importer" = "lua src/main.lua \"$@\""
