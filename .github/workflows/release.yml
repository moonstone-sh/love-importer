name: Love Importer CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  validate:
    name: Validate Love Importer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: moonstone-sh/moonstone
          path: .ci/moonstone
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install release tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y b3sum
      - name: Build Moonstone CLI
        working-directory: .ci/moonstone
        run: |
          zig build
          echo "$GITHUB_WORKSPACE/.ci/moonstone/zig-out/bin" >> "$GITHUB_PATH"
      - name: Synchronize project
        run: moon sync
      - name: Validate and export with Ballad
        run: |
          moon run test
          moon run export

  publish:
    name: Publish Love Importer registry artifact
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: moonstone-sh/moonstone
          path: .ci/moonstone
      - uses: actions/checkout@v4
        with:
          repository: moonstone-sh/ballad
          path: .ci/ballad
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install release tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y b3sum
      - name: Build Moonstone CLI
        working-directory: .ci/moonstone
        run: |
          zig build
          echo "$GITHUB_WORKSPACE/.ci/moonstone/zig-out/bin" >> "$GITHUB_PATH"
      - name: Synchronize and export tagged project
        run: |
          moon sync
          moon run export
      - name: Verify tag version
        run: test "${GITHUB_REF_NAME#v}" = "$(sed -n 's/^version = "\(.*\)"$/\1/p' moonstone.toml | head -1)"
      - name: Upload immutable GitHub release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          asset="$(find dist/love-importer/registry-artifact -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          test -n "$asset"
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "Love Importer $GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" "$asset" --clobber
          echo "MOONSTONE_ARTIFACT_URL=https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/$(basename "$asset")" >> "$GITHUB_ENV"
      - name: Publish registry artifact
        env:
          MOONSTONE_TOKEN: ${{ secrets.MOONSTONE_TOKEN }}
          MOONSTONE_ARTIFACT_URL: ${{ env.MOONSTONE_ARTIFACT_URL }}
        run: |
          test -n "$MOONSTONE_TOKEN"
          dist/love-importer/registry-artifact/publish.sh
      - name: Verify published package is resolvable
        run: .ci/ballad/scripts/wait-for-publication.sh dist/love-importer/registry-artifact/package.toml
