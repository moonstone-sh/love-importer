name: Validate and publish Love Importer

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: moonstone-sh/moonstone
          path: .ci/moonstone
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build Moonstone CLI
        working-directory: .ci/moonstone
        run: |
          zig build
          echo "$GITHUB_WORKSPACE/.ci/moonstone/zig-out/bin" >> "$GITHUB_PATH"
      - name: Synchronize project
        run: moon sync
      - name: Validate and export with Ballad
        run: |
          moon run test
          moon run export
      - name: Verify tag version
        if: startsWith(github.ref, 'refs/tags/')
        run: test "${GITHUB_REF_NAME#v}" = "$(sed -n 's/^version = "\(.*\)"$/\1/p' moonstone.toml | head -1)"
      - name: Publish registry artifact
        if: startsWith(github.ref, 'refs/tags/')
        env:
          MOONSTONE_TOKEN: ${{ secrets.MOONSTONE_TOKEN }}
        run: |
          test -n "$MOONSTONE_TOKEN"
          dist/love-importer/registry-artifact/publish.sh
